"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
continuation_prompt = '[‚ĖĻ ](bold white)'

format = """
[‚ĖĎ‚Ėí‚Ėď](#A3AED2)\
[ ÔĆď ](bg:#A3AED2 fg:#090C0C)\
[Óāį ](bg:#769FF0 fg:#A3AED2)\
$directory\
[Óāį ](bg:#394260 fg:#769FF0)\
$git_branch\
$git_commit\
$git_status\
$git_state\
[Óāį ](bg:#212736 fg:#394260)\
$hostname\
$docker_context\
$nix_shell\
$nodejs\
[Óāį ](bg:#1D2230 fg:#212736)\
$shell\
$shlvl\
[Óāį ](fg:#1D2230)\
$fill\
[Óā≤](fg:#1D2230)\
$status\
$cmd_duration\
[Óā≤](bg:#090C0C fg:#A3AED2)\
$time\
[‚Ėď‚Ėí‚ĖĎ](#A3AED2)\
\n$character
"""

[fill]
symbol = ' '

[username]
format = '[ $user]($style)'
style_user = 'bg:#A3AED2 fg:#090C0C'
style_root = 'bg:#A3AED2 fg:#090C0C'
show_always = true

[hostname]
format = '[$ssh_symbol$hostname : ]($style)'
ssh_only = true
ssh_symbol = 'ÓĮą '
style = 'bg:#212736 bold yellow'

[directory]
format = '[$path ]($style)'
style = 'bg:#769FF0 fg:#E3E5E5'
truncation_length = 4
truncation_symbol = '‚Ä¶/'

[directory.substitutions]
"Documents" = 'ůįąô'
"Downloads" = 'ÔÄô'
"Playlists" = 'ÔÄĀ'
"Pictures" = 'ÔÄĺ'
"Source" = 'ůį≤č'

[git_branch]
always_show_remote = true
format = '[$symbol]($style)'
style = 'bg:#394260 fg:#769FF0'
symbol = 'Ôźė $branch'

[git_commit]
format = '[ \($hash\)]($style)'
style = 'bg:#394260 fg:#769FF0'

[git_status]
format = '[ $all_status$ahead_behind]($style)'
style = 'bg:#394260 fg:#769FF0'
use_git_executable = true

conflicted = '='
stashed = '[$ ](bg:#394260 fg:#26C6DA)'
deleted = '[‚úė ](bg:#394260 fg:#EF5350)'
renamed = '[¬Ľ ](bg:#394260 fg:#FFB74D)'
modified = '[! ](bg:#394260 fg:#FFEE58)'
typechanged = '[. ](bg:#394260 fg:#B0BEC5)'
staged = '[+ ](bg:#394260 fg:#66BB6A)'
untracked = '[? ](bg:#394260 fg:#BA68C8)'

ahead = '[‚á°${count}](bg:#394260 fg:#81C784) '
behind = '[‚á£${count}](bg:#394260 fg:#E57373) '
diverged = '[‚á°${ahead_count}/‚á£${behind_count}](bg:#394260 fg:#F06292) '

[git_state]
format = '[$state $progress_current/$progress_total ]($style)'
style =	'bg:#394260 fg:#769FF0'

rebase = '[Rebase](bg:#394260 fg:#FFA07A)'
merge = '[Merge](bg:#394260 fg:#FFA07A)'
revert = '[Revert](bg:#394260 fg:#FFA07A)'
cherry_pick = '[Cherry-p](bg:#394260 fg:#FFA07A)'
bisect = '[Bisect](bg:#394260 fg:#FFA07A)'

[docker_context]
format = '[$symbol]($style)'
style = 'bg:#212736 fg:#769FF0'
symbol = 'docker ÔĆą '

[nix_shell]
format = '[$symbol]($style)'
style = 'bg:#212736 fg:#769FF0'
symbol = 'nix-shell ůĪĄÖ '

[nodejs]
format = '[$symbol]($style)'
style = 'bg:#212736 fg:#769FF0'
symbol = 'nodejs Óúė '

[shell]
bash_indicator = 'ÓĮä bsh'
format = '[$indicator ]($style)'
disabled = false
style = 'bg:#1D2230 fg:#A0A9CB'

[shlvl]
disabled = false
format = '[lv.$shlvl ]($style)'
threshold = 4
style = 'bg:#1D2230 fg:#A0A9CB'

[status]
format = '[$symbol]($style)'
disabled = false
map_symbol = true
style = 'bg:#1D2230'
symbol = ' [‚úė](bg:#1D2230 bold red) '
success_symbol = ' [‚úĒ](bg:#1D2230 bold green) '
sigint_symbol = ' [ÔĀĪ](bg:#1D2230 bold yellow) '
signal_symbol = ' [ÔĀô](bg:#1D2230 bold blue) '
not_executable_symbol = ' [ůĪŹé](bg:#1D2230 bold purple) '
not_found_symbol = ' [ůįĪľ](bg:#1D2230 bold cyan) '

[cmd_duration]
format = '[took [$duration]($style bold yellow) ]($style)'
min_time = 5_000
style = 'bg:#1D2230 fg:#A0A9CB'

[time]
disabled = false
format = '[[ Ôźļ $time ](bg:#A3AED2 fg:#090C0C)]($style)'
time_format = '%R'
style = 'bg:#212736 fg:#769FF0'

[character]
format = '$symbol'
success_symbol = '[‚Ėł ](bold green)'
error_symbol = '[‚Ėł ](bold red)'
